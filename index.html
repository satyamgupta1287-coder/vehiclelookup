<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAHAN Trace | Secure Gateway</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root {
    --primary: #0ea5e9;
    --primary-glow: rgba(14, 165, 233, 0.4);
    --secondary: #6366f1;
    --bg-dark: #020617;
    --card-bg: rgba(30, 41, 59, 0.4);
    --input-bg: rgba(15, 23, 42, 0.6);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border-color: rgba(255, 255, 255, 0.08);
    
    --success: #10b981;
    --error: #ef4444;
    --error-bg: rgba(239, 68, 68, 0.1);
  }

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  html, body {
    height: 100%;
    background-color: var(--bg-dark);
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.12), transparent 25%),
      radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.12), transparent 25%);
    font-family: 'Outfit', sans-serif;
    color: var(--text-main);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  .gradient-border {
    position: relative;
    border-radius: 22px;
    background: linear-gradient(0deg, rgba(14, 165, 233, 0.1), rgba(99, 102, 241, 0.1));
    padding: 1px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
  }

  .container {
    background: var(--card-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 21px;
    overflow: hidden;
  }

  /* Header Section */
  .header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border-color);
    position: relative;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    padding: 10px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 16px var(--primary-glow);
  }

  .logo-text h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #ffffff;
  }
  
  .logo-text p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    margin-top: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Form Area */
  .form-body {
    padding: 28px 32px 32px;
  }

  .form-group {
    margin-bottom: 22px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #e2e8f0;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    color: var(--text-muted);
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    transition: color 0.3s ease;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 14px 14px 14px 46px;
    font-size: 15px;
    color: #ffffff;
    transition: all 0.3s ease;
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    background: rgba(15, 23, 42, 0.9);
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
    outline: none;
  }
  
  input:focus + .input-icon, 
  .input-wrapper:focus-within .input-icon {
    color: var(--primary);
  }
  
  input[type="text"] {
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 2px;
  }

  input::placeholder {
    color: #64748b;
    font-family: 'Outfit', sans-serif;
    letter-spacing: normal;
    text-transform: none;
  }

  .helper-text {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .helper-text .highlight {
    color: var(--primary);
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
  }
  .helper-text .highlight:hover {
    color: #fff;
    text-shadow: 0 0 8px var(--primary-glow);
  }

  /* Button */
  button[type="submit"] {
    width: 100%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #ffffff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  button[type="submit"]:hover { 
    box-shadow: 0 8px 24px var(--primary-glow);
    transform: translateY(-1px);
  }
  
  button[type="submit"]:active { 
    transform: translateY(1px); 
  }
  
  button[type="submit"]:disabled { 
    opacity: 0.7; 
    cursor: not-allowed; 
    transform: none; 
    box-shadow: none;
  }

  /* Error Alert */
  .alert {
    display: none;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 13.5px;
    font-weight: 500;
    margin-bottom: 24px;
    align-items: flex-start;
    gap: 12px;
    border: 1px solid transparent;
  }
  
  .alert.show { display: flex; animation: fadeIn 0.3s ease; }
  
  .alert-error {
    background: var(--error-bg);
    border-color: rgba(239, 68, 68, 0.2);
    color: #fca5a5;
  }

  /* Results Section */
  .result-card {
    display: none;
    margin-top: 24px;
    border: 1px solid rgba(16, 185, 129, 0.2);
    border-radius: 14px;
    background: rgba(16, 185, 129, 0.05);
    overflow: hidden;
  }

  .result-card.show { display: block; animation: fadeIn 0.4s ease; }

  .result-header {
    background: rgba(16, 185, 129, 0.1);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(16, 185, 129, 0.1);
  }

  .status-tag {
    color: var(--success);
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .status-tag::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
  }

  .result-body {
    padding: 20px;
  }
  
  .data-group {
    margin-bottom: 16px;
  }
  
  .data-group:last-child {
    margin-bottom: 0;
  }

  .data-divider {
    height: 1px;
    background: rgba(255, 255, 255, 0.08);
    margin: 16px 0;
  }
  
  .data-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .data-value {
    font-size: 18px;
    font-weight: 700;
    color: #ffffff;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    justify-content: space-between;
    align-items: center;
    word-break: break-word;
  }

  .data-value.mobile .val-text {
    color: var(--primary);
    text-shadow: 0 0 10px rgba(14, 165, 233, 0.3);
  }

  .copy-action {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #ffffff;
    font-size: 11px;
    font-family: 'Outfit', sans-serif;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: 12px;
    flex-shrink: 0;
  }
  
  .copy-action:hover { background: rgba(255, 255, 255, 0.2); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Loading Dots */
  .dots span { animation: pulse 1.4s infinite; opacity: 0.3; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>

  <div class="gradient-border">
    <div class="container">
      <div class="header">
        <div class="logo-area">
          <div class="logo-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
          </div>
          <div class="logo-text">
            <h1>VAHAN TRACE</h1>
            <p>Secure Gateway Node</p>
          </div>
        </div>
      </div>

      <div class="form-body">
        <div class="alert alert-error" id="errorBox">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
            <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>
          </svg>
          <div id="errorText">Error message here.</div>
        </div>

        <form id="lookupForm">
          <div class="form-group">
            <label for="regInput">Vehicle Registration Number</label>
            <div class="input-wrapper">
              <div class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
              </div>
              <input type="text" id="regInput" placeholder="e.g. JH11AB1187" maxlength="12" autocomplete="off" spellcheck="false">
            </div>
          </div>

          <div class="form-group">
            <label for="keyInput">Access Key</label>
            <div class="input-wrapper">
              <div class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
              </div>
              <input type="password" id="keyInput" placeholder="Enter authorization key" autocomplete="off">
            </div>
            <div class="helper-text">
              <span>Secured connection.</span>
              <span class="highlight" onclick="alert('Contact Admin for Access Key!')">For access key, DM Us</span>
            </div>
          </div>
          
          <button type="submit" id="submitBtn">
            <span id="btnLabel">Execute Trace</span>
          </button>
        </form>

        <div class="result-card" id="resultBox">
          <div class="result-header">
            <div style="font-size:11px; color:var(--text-muted); font-weight:500; letter-spacing:1px;">
              QUERY: <span id="queriedReg" style="color:#fff; font-weight:600;">—</span>
            </div>
            <div class="status-tag">Verified</div>
          </div>
          <div class="result-body">
            
            <div class="data-group">
              <div class="data-label">Vehicle Owner Name</div>
              <div class="data-value">
                <span class="val-text" id="nameOut">—</span>
                <button type="button" class="copy-action" onclick="copyData('nameOut', this)">Copy</button>
              </div>
            </div>

            <div class="data-divider"></div>

            <div class="data-group">
              <div class="data-label">Registered Mobile No.</div>
              <div class="data-value mobile">
                <span class="val-text" id="mobileOut">—</span>
                <button type="button" class="copy-action" onclick="copyData('mobileOut', this)">Copy</button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  // Pointing to your new Vercel Backend Script
  const API_BASE = "/api/getdata?reg=";
  const REQUIRED_KEY = "key01"; 

  const form = document.getElementById('lookupForm');
  const input = document.getElementById('regInput');
  const keyInput = document.getElementById('keyInput');
  const btn = document.getElementById('submitBtn');
  const btnLabel = document.getElementById('btnLabel');
  
  const resultBox = document.getElementById('resultBox');
  const errorBox = document.getElementById('errorBox');
  const errorText = document.getElementById('errorText');
  
  const queriedReg = document.getElementById('queriedReg');
  const nameOut = document.getElementById('nameOut');
  const mobileOut = document.getElementById('mobileOut');

  // Format Input automatically (No spaces)
  input.addEventListener('input', () => {
    input.value = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  });

  // Hacker Typing Effect
  function typeEffect(element, text, speed = 25) {
    element.textContent = "";
    let i = 0;
    function type() {
      if (i < text.length) {
        element.textContent += text.charAt(i);
        i++;
        setTimeout(type, speed);
      }
    }
    type();
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const reg = input.value.trim();
    const authKey = keyInput.value.trim();
    
    errorBox.classList.remove('show');
    resultBox.classList.remove('show');

    if(!reg) {
      showError("Registration Number is required.");
      return;
    }
    if(!authKey) {
      showError("Access Denied: Key is required. For access key, DM Us.");
      return;
    }

    btn.disabled = true;
    btnLabel.innerHTML = 'Connecting<span class="dots"><span>.</span><span>.</span><span>.</span></span>';

    setTimeout(async () => {
      // Validate Hardcoded Key
      if(authKey !== REQUIRED_KEY) {
        showError("Access Denied: Invalid Key. For access key, DM Us.");
        btn.disabled = false;
        btnLabel.textContent = 'Execute Trace';
        keyInput.value = ""; 
        return;
      }

      btnLabel.innerHTML = 'Fetching Data<span class="dots"><span>.</span><span>.</span><span>.</span></span>';

      try {
        const res = await fetch(API_BASE + encodeURIComponent(reg));
        if(!res.ok) throw new Error("Gateway returned HTTP " + res.status);
        
        // Expected response from updated backend: { owner: "...", mobile: "..." }
        const data = await res.json();
        
        const ownerName = data.owner || "N/A";
        const mobileNum = data.mobile || "N/A";

        queriedReg.textContent = reg;
        resultBox.classList.add('show');
        
        // Trigger animations for both fields simultaneously
        typeEffect(nameOut, ownerName);
        typeEffect(mobileOut, mobileNum);

      } catch(err) {
        showError("Trace Failed: " + err.message);
      } finally {
        btn.disabled = false;
        btnLabel.textContent = 'Execute Trace';
      }
    }, 600);
  });

  function showError(msg) {
    errorText.textContent = msg;
    errorBox.classList.add('show');
  }

  // Reusable Copy Function
  function copyData(elementId, btnElement) {
    const textToCopy = document.getElementById(elementId).textContent;
    
    if(textToCopy && textToCopy !== "—" && textToCopy !== "N/A") {
      navigator.clipboard.writeText(textToCopy).then(() => {
        const originalText = btnElement.textContent;
        btnElement.textContent = 'Copied!';
        btnElement.style.background = 'rgba(16, 185, 129, 0.2)';
        btnElement.style.color = '#10b981';
        btnElement.style.borderColor = 'rgba(16, 185, 129, 0.4)';
        
        setTimeout(() => {
          btnElement.textContent = 'Copy';
          btnElement.style.background = 'rgba(255, 255, 255, 0.1)';
          btnElement.style.color = '#ffffff';
          btnElement.style.borderColor = 'rgba(255, 255, 255, 0.1)';
        }, 1500);
      });
    }
  }
</script>

</body>
</html>
