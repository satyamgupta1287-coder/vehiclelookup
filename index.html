<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAHAN Trace | Advanced Terminal</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --primary: #0ea5e9;
    --primary-glow: rgba(14, 165, 233, 0.5);
    --secondary: #8b5cf6;
    --bg-dark: #07090f;
    --glass-bg: rgba(15, 23, 42, 0.45);
    --glass-border: rgba(255, 255, 255, 0.08);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    
    --success: #10b981;
    --error: #ef4444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background-color: var(--bg-dark);
    font-family: 'Outfit', sans-serif;
    color: var(--text-main);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }

  /* Animated Glowing Background Orbs */
  .orb-1, .orb-2 {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.4;
    z-index: -1;
    animation: float 10s infinite ease-in-out alternate;
  }
  .orb-1 {
    width: 300px; height: 300px;
    background: var(--primary);
    top: -50px; left: -50px;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: var(--secondary);
    bottom: -100px; right: -100px;
    animation-delay: -5s;
  }

  @keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, 50px) scale(1.1); }
  }

  /* Main Container */
  .container {
    width: 100%;
    max-width: 480px;
    background: var(--glass-bg);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 24px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.8), inset 0 1px 0 rgba(255,255,255,0.1);
    position: relative;
    z-index: 10;
  }

  /* Header Section */
  .header {
    padding: 30px 32px 20px;
    border-bottom: 1px solid var(--glass-border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    padding: 10px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--primary-glow);
  }
  .logo-text h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.5px; }
  .logo-text p { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-top: 2px;}

  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 10px var(--success);
    position: relative;
  }
  .status-dot::after {
    content: ''; position: absolute; top: -4px; left: -4px; right: -4px; bottom: -4px;
    border-radius: 50%; border: 1px solid var(--success);
    animation: pulse-ring 2s infinite cubic-bezier(0.215, 0.61, 0.355, 1);
  }

  @keyframes pulse-ring { 0% { transform: scale(0.5); opacity: 0; } 50% { opacity: 0.5; } 100% { transform: scale(1.5); opacity: 0; } }

  /* Form Area */
  .form-body { padding: 28px 32px 32px; }
  .form-group { margin-bottom: 24px; }
  .form-group label {
    display: block; font-size: 12px; font-weight: 600; color: var(--text-muted);
    margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase;
  }
  
  .input-wrapper { position: relative; }
  .input-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); width: 18px; height: 18px; transition: 0.3s;
  }

  input[type="text"], input[type="password"] {
    width: 100%; background: rgba(0, 0, 0, 0.2);
    border: 1px solid var(--glass-border); border-radius: 12px;
    padding: 16px 16px 16px 44px; font-size: 16px; color: #fff;
    transition: all 0.3s ease; font-family: 'Space Mono', monospace;
  }

  input:focus {
    background: rgba(0, 0, 0, 0.4); border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); outline: none;
  }
  input:focus + .input-icon { color: var(--primary); }
  
  input::placeholder { color: #475569; font-family: 'Outfit', sans-serif; letter-spacing: normal; }

  /* Submit Button */
  button[type="submit"] {
    width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #fff; border: none; border-radius: 12px; padding: 18px;
    font-size: 15px; font-weight: 600; letter-spacing: 1px;
    cursor: pointer; transition: all 0.3s; text-transform: uppercase;
    position: relative; overflow: hidden;
  }
  button[type="submit"]:hover { box-shadow: 0 10px 25px var(--primary-glow); transform: translateY(-2px); }
  button[type="submit"]:active { transform: translateY(1px); }
  button[type="submit"]:disabled { opacity: 0.7; cursor: wait; transform: none; box-shadow: none; filter: grayscale(50%); }

  /* Loading Skeleton System */
  .skeleton-box {
    display: none; margin-top: 24px; padding: 20px;
    background: rgba(0,0,0,0.2); border-radius: 14px; border: 1px solid var(--glass-border);
  }
  .skeleton-box.show { display: block; animation: fadeIn 0.3s; }
  .shimmer-line {
    height: 18px; border-radius: 4px; margin-bottom: 12px;
    background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.15) 50%, rgba(255,255,255,0.05) 75%);
    background-size: 400% 100%;
    animation: shimmer 1.5s infinite;
  }
  .shimmer-line.w-half { width: 50%; }
  .shimmer-line.w-full { width: 100%; height: 24px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  /* Results Section */
  .result-card {
    display: none; margin-top: 24px;
    background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2);
    border-radius: 14px; overflow: hidden;
  }
  .result-card.show { display: block; animation: fadeIn 0.4s ease; }

  .result-header {
    background: rgba(16, 185, 129, 0.1); padding: 12px 20px;
    border-bottom: 1px solid rgba(16, 185, 129, 0.1);
    display: flex; justify-content: space-between; align-items: center;
  }
  .query-text { font-family: 'Space Mono', monospace; color: #fff; font-size: 14px; }

  .result-body { padding: 24px 20px; }
  .data-group { margin-bottom: 20px; }
  .data-group:last-child { margin-bottom: 0; }
  
  .data-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .data-value {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 18px; font-weight: 700; color: #fff; font-family: 'Space Mono', monospace;
  }
  .data-value.accent { color: var(--primary); text-shadow: 0 0 10px rgba(14, 165, 233, 0.3); }

  .copy-action {
    background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: #fff;
    font-size: 11px; font-family: 'Outfit', sans-serif; padding: 6px 12px; border-radius: 6px;
    cursor: pointer; transition: 0.2s;
  }
  .copy-action:hover { background: rgba(255,255,255,0.1); }

  /* Toast Notification System */
  .toast-container {
    position: fixed; top: 20px; right: 20px; z-index: 1000;
    display: flex; flex-direction: column; gap: 10px;
  }
  .toast {
    background: var(--glass-bg); backdrop-filter: blur(10px);
    border-left: 4px solid var(--primary); border-radius: 8px;
    padding: 16px 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    display: flex; align-items: center; gap: 12px; min-width: 280px;
    transform: translateX(120%); transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }
  .toast.show { transform: translateX(0); }
  .toast.error { border-left-color: var(--error); }
  .toast.success { border-left-color: var(--success); }
  
  .toast-icon { width: 20px; height: 20px; }
  .toast.error .toast-icon { color: var(--error); }
  .toast.success .toast-icon { color: var(--success); }
  .toast-message { font-size: 13px; font-weight: 500; color: #fff; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .help-link {
    display: inline-block; margin-top: 10px; font-size: 12px; color: var(--text-muted);
    text-decoration: none; border-bottom: 1px dashed var(--text-muted); transition: 0.2s;
  }
  .help-link:hover { color: var(--primary); border-color: var(--primary); }

</style>
</head>
<body>

  <div class="orb-1"></div>
  <div class="orb-2"></div>

  <div class="toast-container" id="toastContainer"></div>

  <div class="container">
    <div class="header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        </div>
        <div class="logo-text">
          <h1>VAHAN TRACE</h1>
          <p>Secure Node // Online</p>
        </div>
      </div>
      <div class="status-dot"></div>
    </div>

    <div class="form-body">
      <form id="lookupForm">
        <div class="form-group">
          <label>Registration Number</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            <input type="text" id="regInput" placeholder="JH 11 AB 1187" maxlength="15" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div class="form-group">
          <label>Access Key</label>
          <div class="input-wrapper">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
            <input type="password" id="keyInput" placeholder="Enter secure key" autocomplete="off">
          </div>
          <div style="text-align: right;">
            <a href="#" class="help-link" onclick="showToast('Admin Telegram: @YourUsername', 'success')">Need access key? DM Admin</a>
          </div>
        </div>
        
        <button type="submit" id="submitBtn">Initialize Trace</button>
      </form>

      <div class="skeleton-box" id="skeletonBox">
        <div style="font-size: 11px; color: var(--primary); margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase;">Scanning Database...</div>
        <div class="shimmer-line w-half"></div>
        <div class="shimmer-line w-full"></div>
        <div style="margin-top:20px;"></div>
        <div class="shimmer-line w-half"></div>
        <div class="shimmer-line w-full"></div>
      </div>

      <div class="result-card" id="resultBox">
        <div class="result-header">
          <span style="font-size:11px; color:var(--text-muted); letter-spacing:1px; text-transform:uppercase;">Target:</span>
          <span class="query-text" id="queriedReg">—</span>
        </div>
        <div class="result-body">
          <div class="data-group">
            <div class="data-label">Vehicle Owner</div>
            <div class="data-value">
              <span id="nameOut">—</span>
              <button type="button" class="copy-action" onclick="copyData('nameOut', this)">Copy</button>
            </div>
          </div>
          
          <div style="height:1px; background:rgba(255,255,255,0.05); margin: 20px 0;"></div>

          <div class="data-group">
            <div class="data-label">Registered Mobile</div>
            <div class="data-value accent">
              <span id="mobileOut">—</span>
              <button type="button" class="copy-action" onclick="copyData('mobileOut', this)">Copy</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = "/api/getdata?reg=";
  const REQUIRED_KEY = "key01"; 

  const form = document.getElementById('lookupForm');
  const input = document.getElementById('regInput');
  const keyInput = document.getElementById('keyInput');
  const btn = document.getElementById('submitBtn');
  
  const skeletonBox = document.getElementById('skeletonBox');
  const resultBox = document.getElementById('resultBox');
  
  const queriedReg = document.getElementById('queriedReg');
  const nameOut = document.getElementById('nameOut');
  const mobileOut = document.getElementById('mobileOut');
  const toastContainer = document.getElementById('toastContainer');

  // SVG Icons for Toasts
  const icons = {
    error: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`,
    success: `<svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`
  };

  // Toast Notification Function
  function showToast(message, type = 'error') {
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `${icons[type]} <span class="toast-message">${message}</span>`;
    
    toastContainer.appendChild(toast);
    
    // Trigger animation
    setTimeout(() => toast.classList.add('show'), 10);
    
    // Remove after 3.5s
    setTimeout(() => {
      toast.classList.remove('show');
      setTimeout(() => toast.remove(), 400);
    }, 3500);
  }

  // Auto-Formatting Input (Add space visually, e.g. JH 11 AB 1187)
  input.addEventListener('input', (e) => {
    let cursor = e.target.selectionStart;
    let val = input.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
    
    let formatted = '';
    for(let i=0; i<val.length; i++) {
      if(i === 2 || i === 4 || i === 6) formatted += ' ';
      formatted += val[i];
    }
    input.value = formatted;
  });

  // Hacker Typing Effect
  function typeEffect(element, text, speed = 30) {
    element.textContent = "";
    let i = 0;
    function type() {
      if (i < text.length) {
        element.textContent += text.charAt(i);
        i++;
        setTimeout(type, speed);
      }
    }
    type();
  }

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    // Clean spaces for API call
    const reg = input.value.replace(/\s/g, '');
    const authKey = keyInput.value.trim();
    
    resultBox.classList.remove('show');
    skeletonBox.classList.remove('show');

    if(!reg || reg.length < 4) {
      showToast("Enter a valid Registration Number.", "error");
      return;
    }
    if(!authKey) {
      showToast("Access Key is required. DM Admin.", "error");
      return;
    }

    btn.disabled = true;
    btn.textContent = 'INITIALIZING...';

    // Simulate connection & start skeleton
    setTimeout(async () => {
      if(authKey !== REQUIRED_KEY) {
        showToast("Invalid Access Key!", "error");
        btn.disabled = false;
        btn.textContent = 'Initialize Trace';
        keyInput.value = ""; 
        return;
      }

      skeletonBox.classList.add('show');
      btn.textContent = 'EXTRACTING...';

      try {
        const res = await fetch(API_BASE + encodeURIComponent(reg));
        if(!res.ok) throw new Error("Gateway returned HTTP " + res.status);
        
        const data = await res.json();
        
        const ownerName = data.owner || "DATA NOT FOUND";
        const mobileNum = data.mobile || "DATA NOT FOUND";

        skeletonBox.classList.remove('show');
        queriedReg.textContent = input.value; // Show formatted input
        resultBox.classList.add('show');
        
        typeEffect(nameOut, ownerName);
        typeEffect(mobileOut, mobileNum);
        
        showToast("Trace Completed Successfully.", "success");

      } catch(err) {
        skeletonBox.classList.remove('show');
        showToast("Extraction Failed: " + err.message, "error");
      } finally {
        btn.disabled = false;
        btn.textContent = 'Initialize Trace';
      }
    }, 800); // UI delay for hacker feel
  });

  // Modern Copy Function
  function copyData(elementId, btnElement) {
    const textToCopy = document.getElementById(elementId).textContent;
    
    if(textToCopy && textToCopy !== "—" && textToCopy !== "DATA NOT FOUND") {
      navigator.clipboard.writeText(textToCopy).then(() => {
        showToast(`Copied: ${textToCopy}`, "success");
        const originalText = btnElement.textContent;
        btnElement.textContent = 'Copied';
        btnElement.style.color = 'var(--success)';
        btnElement.style.borderColor = 'var(--success)';
        
        setTimeout(() => {
          btnElement.textContent = 'Copy';
          btnElement.style.color = '#fff';
          btnElement.style.borderColor = 'var(--glass-border)';
        }, 1500);
      });
    } else {
      showToast("No data to copy!", "error");
    }
  }
</script>

</body>
</html>
