<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAHAN Trace | Secure Gateway</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --primary: #0ea5e9;
    --primary-glow: rgba(14, 165, 233, 0.4);
    --secondary: #6366f1;
    --bg-dark: #020617;
    --card-bg: rgba(30, 41, 59, 0.4);
    --input-bg: rgba(15, 23, 42, 0.6);
    --text-main: #f8fafc;
    --text-muted: #94a3b8;
    --border-color: rgba(255, 255, 255, 0.08);
    
    --success: #10b981;
    --success-bg: rgba(16, 185, 129, 0.1);
    --error: #ef4444;
    --error-bg: rgba(239, 68, 68, 0.1);
  }

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  html, body {
    height: 100%;
    background-color: var(--bg-dark);
    /* Modern glowing background effect */
    background-image: 
      radial-gradient(circle at 15% 50%, rgba(99, 102, 241, 0.15), transparent 25%),
      radial-gradient(circle at 85% 30%, rgba(14, 165, 233, 0.15), transparent 25%);
    font-family: 'Outfit', sans-serif;
    color: var(--text-main);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 460px;
    background: var(--card-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    border: 1px solid var(--border-color);
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
  }

  /* Header Section */
  .header {
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border-color);
    position: relative;
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    padding: 10px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 16px var(--primary-glow);
  }

  .logo-text h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #ffffff;
  }
  
  .logo-text p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
    margin-top: 2px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* Form Area */
  .form-body {
    padding: 28px 32px 32px;
  }

  .form-group {
    margin-bottom: 22px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #e2e8f0;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 16px;
    color: var(--text-muted);
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    transition: color 0.3s ease;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    border-radius: 12px;
    padding: 14px 14px 14px 46px;
    font-size: 15px;
    color: #ffffff;
    transition: all 0.3s ease;
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    background: rgba(15, 23, 42, 0.9);
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15);
    outline: none;
  }
  
  input:focus + .input-icon, 
  .input-wrapper:focus-within .input-icon {
    color: var(--primary);
  }
  
  input[type="text"] {
    text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
  }

  input::placeholder {
    color: #64748b;
    font-family: 'Outfit', sans-serif;
    letter-spacing: normal;
    text-transform: none;
  }

  .helper-text {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .helper-text .highlight {
    color: var(--primary);
    font-weight: 500;
  }

  /* Button */
  button[type="submit"] {
    width: 100%;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    color: #ffffff;
    border: none;
    border-radius: 12px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.3s ease;
    margin-top: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  button[type="submit"]:hover { 
    box-shadow: 0 8px 24px var(--primary-glow);
    transform: translateY(-1px);
  }
  
  button[type="submit"]:active { 
    transform: translateY(1px); 
  }
  
  button[type="submit"]:disabled { 
    opacity: 0.7; 
    cursor: not-allowed; 
    transform: none; 
    box-shadow: none;
  }

  /* Error Alert */
  .alert {
    display: none;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 13.5px;
    font-weight: 500;
    margin-bottom: 24px;
    align-items: flex-start;
    gap: 12px;
    border: 1px solid transparent;
  }
  
  .alert.show { display: flex; animation: fadeIn 0.3s ease; }
  
  .alert-error {
    background: var(--error-bg);
    border-color: rgba(239, 68, 68, 0.2);
    color: #fca5a5;
  }

  /* Results Section */
  .result-card {
    display: none;
    margin-top: 24px;
    border: 1px solid rgba(16, 185, 129, 0.2);
    border-radius: 14px;
    background: rgba(16, 185, 129, 0.03);
    overflow: hidden;
  }

  .result-card.show { display: block; animation: fadeIn 0.4s ease; }

  .result-header {
    background: rgba(16, 185, 129, 0.1);
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(16, 185, 129, 0.1);
  }

  .status-tag {
    color: var(--success);
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .status-tag::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 8px var(--success);
  }

  .result-body {
    padding: 20px;
  }
  
  .data-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .data-value {
    font-size: 22px;
    font-weight: 600;
    color: #ffffff;
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .copy-action {
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: #ffffff;
    font-size: 12px;
    font-family: 'Outfit', sans-serif;
    padding: 6px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  
  .copy-action:hover { background: rgba(255, 255, 255, 0.2); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Loading Dots */
  .dots span { animation: pulse 1.4s infinite; opacity: 0.3; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
        </div>
        <div class="logo-text">
          <h1>VAHAN TRACE</h1>
          <p>Secure Gateway Node</p>
        </div>
      </div>
    </div>

    <div class="form-body">
      <div class="alert alert-error" id="errorBox">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
          <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <div id="errorText">Error message here.</div>
      </div>

      <form id="lookupForm">
        <div class="form-group">
          <label for="regInput">Vehicle Registration Number</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <input type="text" id="regInput" placeholder="e.g. DL1CAB1234" maxlength="12" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div class="form-group">
          <label for="keyInput">Access Key</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
            </div>
            <input type="password" id="keyInput" placeholder="Enter authorization key" autocomplete="off">
          </div>
          <div class="helper-text">
            <span>Secured connection.</span>
            <span class="highlight">For access key, DM Us.</span>
          </div>
        </div>
        
        <button type="submit" id="submitBtn">
          <span id="btnLabel">Execute Trace</span>
        </button>
      </form>

      <div class="result-card" id="resultBox">
        <div class="result-header">
          <div style="font-size:11px; color:var(--text-muted); font-weight:500; letter-spacing:1px;">
            QUERY: <span id="queriedReg" style="color:#fff; font-weight:600;">—</span>
          </div>
          <div class="status-tag">Verified</div>
        </div>
        <div class="result-body">
          <div class="data-label">Registered Mobile Number</div>
          <div class="data-value">
            <span id="numOut">—</span>
            <button class="copy-action" id="copyBtn">Copy</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = "/api/getdata?reg=";
  const REQUIRED_KEY = "key01"; // Authentication Key Setup

  const form = document.getElementById('lookupForm');
  const input = document.getElementById('regInput');
  const keyInput = document.getElementById('keyInput');
  const btn = document.getElementById('submitBtn');
  const btnLabel = document.getElementById('btnLabel');
  
  const resultBox = document.getElementById('resultBox');
  const errorBox = document.getElementById('errorBox');
  const errorText = document.getElementById('errorText');
  const numOut = document.getElementById('numOut');
  const queriedReg = document.getElementById('queriedReg');
  const copyBtn = document.getElementById('copyBtn');

  // Format Registration Input
  input.addEventListener('input', () => {
    input.value = input.value.toUpperCase().replace(/\s/g, '');
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const reg = input.value.trim();
    const authKey = keyInput.value.trim();
    
    errorBox.classList.remove('show');
    resultBox.classList.remove('show');

    if(!reg) {
      showError("Registration Number is required.");
      return;
    }
    if(!authKey) {
      showError("Access Denied: Key is required. For access key, DM Us.");
      return;
    }

    btn.disabled = true;
    btnLabel.innerHTML = 'Authenticating<span class="dots"><span>.</span><span>.</span><span>.</span></span>';

    // Simulate Secure Authentication Delay
    setTimeout(async () => {
      // Validate Key
      if(authKey !== REQUIRED_KEY) {
        showError("Access Denied: Invalid Key. For access key, DM Us.");
        btn.disabled = false;
        btnLabel.textContent = 'Execute Trace';
        keyInput.value = ""; 
        return;
      }

      btnLabel.innerHTML = 'Extracting Data<span class="dots"><span>.</span><span>.</span><span>.</span></span>';

      try {
        const res = await fetch(API_BASE + encodeURIComponent(reg));
        if(!res.ok) throw new Error("Gateway returned HTTP " + res.status);
        const data = await res.json();

        // Extracting mobile number from typical API structures
        const mobile = data.mobile_no || data.mobile || data.number || data.phone || data.result || "N/A";

        queriedReg.textContent = reg;
        numOut.textContent = mobile;
        resultBox.classList.add('show');
      } catch(err) {
        showError("Trace Failed: " + err.message);
      } finally {
        btn.disabled = false;
        btnLabel.textContent = 'Execute Trace';
      }
    }, 800);
  });

  function showError(msg) {
    errorText.textContent = msg;
    errorBox.classList.add('show');
  }

  // Copy to clipboard functionality
  copyBtn.addEventListener('click', () => {
    const textToCopy = numOut.textContent;
    if(textToCopy && textToCopy !== "N/A" && textToCopy !== "—") {
      navigator.clipboard.writeText(textToCopy).then(() => {
        const originalText = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        copyBtn.style.background = 'rgba(16, 185, 129, 0.2)';
        copyBtn.style.color = '#10b981';
        copyBtn.style.borderColor = 'rgba(16, 185, 129, 0.4)';
        
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.style.background = 'rgba(255, 255, 255, 0.1)';
          copyBtn.style.color = '#ffffff';
          copyBtn.style.borderColor = 'rgba(255, 255, 255, 0.1)';
        }, 1500);
      });
    }
  });
</script>

</body>
</html>
