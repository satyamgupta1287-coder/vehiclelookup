<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VAHAN Trace | Secure Gateway</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@500&display=swap');

  :root {
    --bg-main: #f0f4f8;
    --card-bg: #ffffff;
    --text-primary: #0f172a;
    --text-secondary: #64748b;
    --brand-primary: #0284c7;
    --brand-hover: #0369a1;
    --border-light: #e2e8f0;
    --focus-ring: rgba(2, 132, 199, 0.15);
    
    --success: #059669;
    --success-bg: #ecfdf5;
    --error: #e11d48;
    --error-bg: #fff1f2;
    --error-border: #fecdd3;
  }

  * { 
    box-sizing: border-box; 
    margin: 0; 
    padding: 0; 
  }

  html, body {
    height: 100%;
    background-color: var(--bg-main);
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    width: 100%;
    max-width: 480px;
    background: var(--card-bg);
    border-radius: 16px;
    box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);
    overflow: hidden;
    border: 1px solid rgba(255, 255, 255, 0.8);
  }

  /* Header Section */
  .header {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    padding: 24px 32px;
    position: relative;
    overflow: hidden;
  }
  
  .header::after {
    content: "";
    position: absolute;
    top: 0; right: 0; left: 0; height: 3px;
    background: linear-gradient(90deg, #0ea5e9, #38bdf8, #0ea5e9);
  }

  .logo-area {
    display: flex;
    align-items: center;
    gap: 12px;
    color: #ffffff;
  }

  .logo-icon {
    background: rgba(255, 255, 255, 0.1);
    padding: 8px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-text h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin: 0;
  }
  
  .logo-text p {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Form Area */
  .form-body {
    padding: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    margin-bottom: 8px;
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    color: #94a3b8;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: #f8fafc;
    border: 1px solid var(--border-light);
    border-radius: 10px;
    padding: 14px 14px 14px 42px;
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    transition: all 0.2s ease;
    font-family: inherit;
  }

  input[type="text"]:focus,
  input[type="password"]:focus {
    background: #ffffff;
    border-color: var(--brand-primary);
    box-shadow: 0 0 0 4px var(--focus-ring);
    outline: none;
  }
  
  input[type="text"] {
    text-transform: uppercase;
    font-family: 'Roboto Mono', monospace;
    letter-spacing: 1px;
  }

  input::placeholder {
    color: #cbd5e1;
    font-weight: 400;
    text-transform: none;
    font-family: 'Plus Jakarta Sans', sans-serif;
    letter-spacing: normal;
  }

  /* Button */
  button[type="submit"] {
    width: 100%;
    background: var(--brand-primary);
    color: #ffffff;
    border: none;
    border-radius: 10px;
    padding: 16px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 12px rgba(2, 132, 199, 0.25);
  }

  button[type="submit"]:hover { background: var(--brand-hover); }
  button[type="submit"]:active { transform: scale(0.98); }
  button[type="submit"]:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

  /* Error Alert */
  .alert {
    display: none;
    padding: 14px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 24px;
    align-items: flex-start;
    gap: 12px;
  }
  
  .alert.show { display: flex; animation: slideDown 0.3s ease; }
  
  .alert-error {
    background: var(--error-bg);
    border: 1px solid var(--error-border);
    color: var(--error);
  }

  /* Results Section */
  .result-card {
    display: none;
    margin-top: 24px;
    border: 1px solid var(--border-light);
    border-radius: 12px;
    overflow: hidden;
    background: #ffffff;
  }

  .result-card.show { display: block; animation: slideDown 0.3s ease; }

  .result-header {
    background: #f8fafc;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border-light);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .status-tag {
    background: var(--success-bg);
    color: var(--success);
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .result-body {
    padding: 20px;
  }

  .data-group { margin-bottom: 0; }
  
  .data-label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
  }

  .data-value {
    font-size: 20px;
    font-weight: 700;
    color: var(--text-primary);
    font-family: 'Roboto Mono', monospace;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .copy-action {
    background: #f1f5f9;
    border: none;
    color: var(--brand-primary);
    font-size: 12px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
  }
  
  .copy-action:hover { background: #e2e8f0; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Loading Dots */
  .dots span { animation: pulse 1.4s infinite; opacity: 0.3; }
  .dots span:nth-child(2) { animation-delay: 0.2s; }
  .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>
<body>

  <div class="container">
    <div class="header">
      <div class="logo-area">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
        </div>
        <div class="logo-text">
          <h1>VAHAN API GATEWAY</h1>
          <p>Secure Trace Interface</p>
        </div>
      </div>
    </div>

    <div class="form-body">
      <div class="alert alert-error" id="errorBox">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;">
          <circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        <div id="errorText">Error message here.</div>
      </div>

      <form id="lookupForm">
        <div class="form-group">
          <label for="regInput">Vehicle Registration Number</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <input type="text" id="regInput" placeholder="e.g. DL1CAB1234" maxlength="12" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div class="form-group">
          <label for="keyInput">Access Key</label>
          <div class="input-wrapper">
            <div class="input-icon">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
            </div>
            <input type="password" id="keyInput" placeholder="Enter authorization key" autocomplete="off">
          </div>
        </div>
        
        <button type="submit" id="submitBtn">
          <span id="btnLabel">Execute Trace</span>
        </button>
      </form>

      <div class="result-card" id="resultBox">
        <div class="result-header">
          <div style="font-size:12px; color:var(--text-secondary); font-weight:600;">QUERY: <span id="queriedReg" style="color:var(--text-primary);">—</span></div>
          <div class="status-tag">Verified</div>
        </div>
        <div class="result-body">
          <div class="data-group">
            <div class="data-label">Registered Mobile Number</div>
            <div class="data-value">
              <span id="numOut">—</span>
              <button class="copy-action" id="copyBtn">Copy</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const API_BASE = "/api/getdata?reg=";
  const REQUIRED_KEY = "key01"; // Authentication Key Setup

  const form = document.getElementById('lookupForm');
  const input = document.getElementById('regInput');
  const keyInput = document.getElementById('keyInput');
  const btn = document.getElementById('submitBtn');
  const btnLabel = document.getElementById('btnLabel');
  
  const resultBox = document.getElementById('resultBox');
  const errorBox = document.getElementById('errorBox');
  const errorText = document.getElementById('errorText');
  const numOut = document.getElementById('numOut');
  const queriedReg = document.getElementById('queriedReg');
  const copyBtn = document.getElementById('copyBtn');

  // Format Registration Input
  input.addEventListener('input', () => {
    input.value = input.value.toUpperCase().replace(/\s/g, '');
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const reg = input.value.trim();
    const authKey = keyInput.value.trim();
    
    errorBox.classList.remove('show');
    resultBox.classList.remove('show');

    if(!reg) {
      showError("Vehicle Registration Number is required.");
      return;
    }
    if(!authKey) {
      showError("Access Key is required to execute trace.");
      return;
    }

    btn.disabled = true;
    btnLabel.innerHTML = 'Authenticating<span class="dots"><span>.</span><span>.</span><span>.</span></span>';

    // Simulate Secure Authentication Delay (600ms)
    setTimeout(async () => {
      // Validate Key
      if(authKey !== REQUIRED_KEY) {
        showError("Access Denied: Invalid Authorization Key.");
        btn.disabled = false;
        btnLabel.textContent = 'Execute Trace';
        keyInput.value = ""; // Clear wrong key
        return;
      }

      btnLabel.innerHTML = 'Extracting Data<span class="dots"><span>.</span><span>.</span><span>.</span></span>';

      try {
        const res = await fetch(API_BASE + encodeURIComponent(reg));
        if(!res.ok) throw new Error("Gateway returned HTTP " + res.status);
        const data = await res.json();

        // Extracting mobile number from typical API structures
        const mobile = data.mobile_no || data.mobile || data.number || data.phone || data.result || "N/A";

        queriedReg.textContent = reg;
        numOut.textContent = mobile;
        resultBox.classList.add('show');
      } catch(err) {
        showError("Trace Failed: " + err.message);
      } finally {
        btn.disabled = false;
        btnLabel.textContent = 'Execute Trace';
      }
    }, 600);
  });

  function showError(msg) {
    errorText.textContent = msg;
    errorBox.classList.add('show');
  }

  // Copy to clipboard functionality
  copyBtn.addEventListener('click', () => {
    const textToCopy = numOut.textContent;
    if(textToCopy && textToCopy !== "N/A" && textToCopy !== "—") {
      navigator.clipboard.writeText(textToCopy).then(() => {
        copyBtn.textContent = 'Copied!';
        copyBtn.style.background = 'var(--success-bg)';
        copyBtn.style.color = 'var(--success)';
        
        setTimeout(() => {
          copyBtn.textContent = 'Copy';
          copyBtn.style.background = '#f1f5f9';
          copyBtn.style.color = 'var(--brand-primary)';
        }, 1500);
      });
    }
  });
</script>

</body>
</html>
